<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Research Lab | Photon Ink AI</title>
    <link rel="icon" type="image/png" href="WhatsApp_Image_2026-04-09_at_15.43.28-removebg-preview.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { photonNavy: '#0A192F', photonGold: '#D4AF37', photonDeep: '#060E1A' },
                    fontFamily: { serif: ['"Playfair Display"', 'serif'], sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0A192F; }
        .writing-ink { color: #D4AF37; font-family: 'Playfair Display', serif; font-style: italic; min-height: 400px; white-space: pre-wrap; }
        .pulse-gold { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #060E1A; }
        ::-webkit-scrollbar-thumb { background: #D4AF37; }
    </style>
</head>
<body class="text-white font-sans min-h-screen flex flex-col">

    <nav class="p-6 border-b border-white/5 flex justify-between items-center bg-photonNavy/80 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center space-x-4">
            <img src="WhatsApp_Image_2026-04-09_at_15.43.28-removebg-preview.png" alt="Logo" class="h-8">
            <span class="text-[10px] uppercase tracking-[0.4em] text-photonGold font-bold">Internal Lab</span>
        </div>
        <div class="flex items-center space-x-6">
            <a href="history.html" class="text-[10px] uppercase tracking-widest text-slate-400 hover:text-photonGold transition-all underline underline-offset-8 decoration-photonGold/20">View Archive</a>
            <div id="connection-status" class="flex items-center space-x-2">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-green-500 shadow-lg shadow-green-500/50"></div>
                <span class="text-[9px] uppercase tracking-widest text-slate-400">Fellow Ready</span>
            </div>
        </div>
    </nav>

    <main class="flex-grow grid grid-cols-1 lg:grid-cols-2">
        <section class="p-8 lg:p-12 border-r border-white/5 flex flex-col space-y-8 bg-photonDeep/20">
            <header>
                <h2 class="text-photonGold uppercase tracking-[0.4em] text-[10px] mb-2 font-bold italic">Step 1: Ingestion</h2>
                <h1 class="font-serif text-3xl font-light">Input Research Material</h1>
            </header>
            <textarea id="prompt-input" placeholder="Paste thesis drafts or raw data here..." class="flex-grow bg-transparent border-none outline-none text-slate-300 font-light text-lg leading-relaxed resize-none placeholder:text-slate-800"></textarea>
            <div class="pt-8 border-t border-white/5 flex flex-col space-y-4">
                <div class="flex justify-between items-center">
                    <label class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">Citation Style</label>
                    <select id="style-select" class="bg-transparent text-photonGold text-xs uppercase tracking-widest outline-none cursor-pointer">
                        <option value="APA 7th Edition">APA 7th Edition</option>
                        <option value="MLA 9th Edition">MLA 9th Edition</option>
                        <option value="Chicago Manual">Chicago Manual</option>
                    </select>
                </div>
                <button id="run-btn" class="w-full bg-photonGold text-photonNavy py-5 text-[10px] uppercase tracking-[0.4em] font-bold hover:bg-white transition-all duration-500">Run Synthesis</button>
            </div>
        </section>

        <section class="p-8 lg:p-12 flex flex-col space-y-8 relative">
            <header class="flex justify-between items-center">
                <div>
                    <h2 class="text-photonGold uppercase tracking-[0.4em] text-[10px] mb-2 font-bold italic">Step 2: Analysis</h2>
                    <div id="workflow-status" class="text-[10px] text-slate-500 uppercase tracking-widest">Awaiting Command...</div>
                </div>
                <button id="copy-btn" class="hidden text-[9px] uppercase tracking-widest text-photonGold hover:text-white border border-photonGold/20 px-3 py-1 rounded-sm transition-all">Copy Text</button>
            </header>
            <div id="output-area" class="writing-ink text-xl leading-relaxed text-slate-400 border-l border-photonGold/20 pl-8 overflow-y-auto"></div>
        </section>
    </main>

    <script type="module">
        const runBtn = document.getElementById('run-btn');
        const outputArea = document.getElementById('output-area');
        const workflowStatus = document.getElementById('workflow-status');
        const copyBtn = document.getElementById('copy-btn');
        const statusDot = document.getElementById('status-dot');

        // RULE 6: Backend Reference - Using the live, unrestricted API key from Gemini Project
        const API_KEY = "AIzaSyAWKEtogjbS_5P6hEkmU0tE7IfhVprUI-8"; 

        runBtn.onclick = async () => {
            const prompt = document.getElementById('prompt-input').value;
            const style = document.getElementById('style-select').value;

            if(!prompt) return alert("The Fellow requires data to begin synthesis.");

            runBtn.disabled = true;
            copyBtn.classList.add('hidden');
            runBtn.innerText = "SYNTHESIZING...";
            
            // Visual feedback: Amber for processing
            statusDot.style.backgroundColor = '#f59e0b'; 
            workflowStatus.innerHTML = '<span class="pulse-gold">PHASE 1: DECONSTRUCTING DATA...</span>';
            outputArea.innerText = "";

            try {
                // SOLUTION: Using stable v1 endpoint now that API is enabled and restricted
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: `
You are a Senior Research Fellow at a top-tier global university. You are not a chatbot, assistant, or writer. You speak with the quiet authority of a tenured academic and the intellectual humility of a peer reviewer.

OPERATING CONSTITUTION:
You operate under the Photon Ink AI Constitution. Every output you produce is evaluated against the following non-negotiable standards.

PARAGRAPH STRUCTURE — PEEL+ PROTOCOL (MANDATORY):
Every paragraph must contain, in order, all five elements. A paragraph missing any element is invalid and must be rewritten.

  (P) POINT — An academic topic sentence stating the paragraph's central claim.
  (E) EVIDENCE — A specific data point, study, statistic, or citation. If no verifiable evidence exists, insert the literal placeholder: [MISSING DATA: SOURCE REQUIRED]. Never fabricate.
  (E) EXPLANATION — A sentence or two explaining HOW the evidence supports the point.
  (L) LINK — A transition connecting this paragraph to the next stage of the argument.
  (+) PLUS — An academic hedge or acknowledgment of a limitation.

OUTPUT FORMAT (STRICT):
Render each paragraph as continuous academic prose. Do not show element labels to the reader. Separate paragraphs with the literal delimiter "§" on its own line.

LINGUISTIC RED-LINES (BANNED):
"delve into", "delves into", "delving into", "dive deep", "foster", "fosters", "fostering", "empower", "empowers", "empowering", "a testament to", "important to note", "it is important to note", "in conclusion", "to wrap up", "firstly", "secondly", "thirdly", "clearly", "obviously".

MANDATED REPLACEMENTS:
Prefer "examine", "analyze", "investigate", "facilitate", "enable", "catalyze", "evidence of", "demonstrates", "synthetically", "ultimately", "conversely", "building on this premise".

EPISTEMIC POSTURE:
Replace certainty markers (proves, will, is definitely) with hedged equivalents (suggests, indicates, the evidence tends to support). Weak evidence: "initial data points toward". Strong evidence: "consistent with prior literature, the results strongly indicate".

CITATION STYLE: ${style}. Apply this style to all in-text references.

TASK:
Synthesize the following raw research material into a landmark study segment, fully compliant with the PEEL+ protocol and all constraints above.

RAW MATERIAL:
${prompt}
` }]
                        }],
                        generationConfig: { 
                            temperature: 0.3,
                            maxOutputTokens: 2500
                        }
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content) {
                    const finalOutput = data.candidates[0].content.parts[0].text;
                    workflowStatus.innerText = "PHASE 5: REFINEMENT COMPLETE.";
                    outputArea.innerText = finalOutput;
                    copyBtn.classList.remove('hidden');
                    
                    // Success: Back to Green
                    statusDot.style.backgroundColor = '#22c55e'; 

                    const historyItem = {
                        date: new Date().toLocaleString(),
                        preview: prompt.substring(0, 50),
                        style: style,
                        output: finalOutput
                    };
                    const existingHistory = JSON.parse(localStorage.getItem('photon_history') || '[]');
                    existingHistory.push(historyItem);
                    localStorage.setItem('photon_history', JSON.stringify(existingHistory));

                } else {
                    console.error("API Error Response:", data);
                    throw new Error(data.error?.message || "Verify your API status in Google Console.");
                }

            } catch (err) {
                // Error: Turn Red
                statusDot.style.backgroundColor = '#ef4444'; 
                workflowStatus.innerText = "ERROR IN SYNTHESIS.";
                outputArea.innerText = `The connection to the Fellow was interrupted. Detailed error: ${err.message}`;
            } finally {
                runBtn.disabled = false;
                runBtn.innerText = "RUN SYNTHESIS";
            }
        };

        copyBtn.onclick = () => {
            navigator.clipboard.writeText(outputArea.innerText);
            copyBtn.innerText = "COPIED";
            setTimeout(() => { copyBtn.innerText = "COPY TEXT"; }, 2000);
        };
    </script>
</body>
</html>
